name: Deploy to S3

# Manual trigger only, never on push. Run it from the Actions tab
# (or `gh workflow run deploy.yml`).
on:
  workflow_dispatch:

# Never let two deploys write the same bucket at once.
concurrency:
  group: deploy-s3
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Content-hashed assets are immutable, so cache them forever.
          aws s3 sync dist/assets/ "s3://${S3_BUCKET}/assets/" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-progress

          # Everything else (HTML, sitemap, robots, etc.) must revalidate.
          # --delete prunes files that no longer exist in the build; the
          # assets/ exclude keeps it from touching the immutable uploads above.
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=60, must-revalidate" \
            --no-progress
